name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Publish single-file exe
      run: >
        dotnet publish AUHealthIdGenerator/AUHealthIdGenerator/AUHealthIdGenerator.csproj -c Release
        -r win-x64 --self-contained true
        -p:PublishSingleFile=true
        -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AUHealthIdGenerator-win-x64
        path: ./publish/AUHealthIdGenerator.exe

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/AUHealthIdGenerator.exe
